<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Viral Machine Prompt Generator PRO (Stable)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-4"><div class="max-w-3xl mx-auto space-y-4"><h1 class="text-2xl font-bold">🔥 Viral Machine Generator</h1><div class="bg-gray-800 p-4 rounded space-y-2">
  <input id="character" placeholder="Character" class="w-full p-2 text-black rounded">
  <input id="outfit" placeholder="Outfit" class="w-full p-2 text-black rounded">
  <input id="inputObj" placeholder="Input Object" class="w-full p-2 text-black rounded">
  <input id="outputObj" placeholder="Output Object" class="w-full p-2 text-black rounded">
  <input id="location" placeholder="Location" class="w-full p-2 text-black rounded"><button type="button" id="randomBtn" class="bg-purple-600 px-3 py-2 rounded">🎲 Random</button> <button type="button" id="generateBtn" class="bg-blue-600 px-3 py-2 rounded">⚡ Generate</button>

</div><div id="results"></div></div><script>

function R(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

// RANDOM BUTTON

document.getElementById('randomBtn').onclick = function(){
  document.getElementById('character').value = R(['pria muda asia','wanita muda indonesia']);
  document.getElementById('outfit').value = R(['kaos santai','hoodie hitam']);
  document.getElementById('inputObj').value = R(['telur','daun','jagung']);
  document.getElementById('outputObj').value = R(['anak ayam','bakul','popcorn']);
  document.getElementById('location').value = R(['pabrik','gudang']);
};

// GENERATE BUTTON

document.getElementById('generateBtn').onclick = function(){

  let c = document.getElementById('character').value;
  let o = document.getElementById('outfit').value;
  let i = document.getElementById('inputObj').value;
  let out = document.getElementById('outputObj').value;
  let loc = document.getElementById('location').value;

  if(!c || !i || !out){
    alert('Isi Character, Input, Output');
    return;
  }

  let result = `

SCENE 1 IMAGE:\n${c} memakai ${o} di ${loc}, cinematic\n\nSCENE 1 VIDEO:\nanimate dari gambar di atas, camera push in\n\n
SCENE 2 IMAGE:\nclose up memasukkan ${i} ke mesin\n\nSCENE 2 VIDEO:\nanimate tangan bergerak\n\n
SCENE 3 IMAGE:\nmesin mengubah ${i} jadi ${out}\n\nSCENE 3 VIDEO:\nanimate gear bergerak\n\n
SCENE 4 IMAGE:\n${out} keluar dari mesin\n\nSCENE 4 VIDEO:\nanimate slow motion keluar\n\n
SCENE 5 IMAGE:\n${c} kagum melihat mesin\n\nSCENE 5 VIDEO:\nanimate camera pull back

`;

  document.getElementById('results').innerHTML = '<textarea style="width:100%;height:400px;color:black">'+result+'</textarea>';};

</script></body>
</html>
