<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Viral Machine Prompt Generator PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    textarea { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .card { background:#111827; border:1px solid #1f2937; border-radius:1rem; }
    .btn { border-radius:0.75rem; padding:0.6rem 0.9rem; }
  </style>
</head>
<body class="bg-gray-900 text-white p-4 md:p-6">  <div class="max-w-5xl mx-auto space-y-6">
    <header class="flex items-center justify-between gap-3">
      <h1 class="text-2xl md:text-3xl font-bold">🔥 Viral Machine Prompt Generator PRO</h1>
      <button onclick="randomizeAll()" class="btn bg-purple-600">🎲 Random Viral Idea</button>
    </header><section class="card p-4 md:p-5 space-y-4">
  <div class="grid md:grid-cols-2 gap-3">
    <input id="character" placeholder="Character (e.g. pria muda asia)" class="w-full p-2 rounded text-black" />
    <input id="outfit" placeholder="Outfit (e.g. kaos putih longgar, celana pendek kargo)" class="w-full p-2 rounded text-black" />
    <input id="inputObj" placeholder="Input Object (e.g. telur, daun kelapa, jagung)" class="w-full p-2 rounded text-black" />
    <input id="outputObj" placeholder="Output Object (e.g. anak ayam warna-warni, bakul anyaman hijau)" class="w-full p-2 rounded text-black" />
    <input id="location" placeholder="Location (e.g. pabrik futuristik minimalis)" class="w-full p-2 rounded text-black md:col-span-2" />
  </div>

  <div class="grid md:grid-cols-3 gap-3">
    <select id="style" class="w-full p-2 rounded text-black">
      <option>Ultra Realistic Cinematic</option>
      <option>Hollywood Film</option>
      <option>K-Drama Aesthetic</option>
      <option>Pixar Style</option>
      <option>TikTok Hyper Viral</option>
    </select>
    <select id="camera" class="w-full p-2 rounded text-black">
      <option>50mm cinematic lens</option>
      <option>35mm handheld</option>
      <option>macro lens</option>
      <option>wide angle 24mm</option>
    </select>
    <select id="lighting" class="w-full p-2 rounded text-black">
      <option>dramatic side lighting</option>
      <option>soft diffused lighting</option>
      <option>neon glow futuristic</option>
      <option>high contrast studio</option>
    </select>
  </div>

  <div class="flex flex-wrap gap-3">
    <button onclick="generatePrompt()" class="btn bg-blue-600">⚡ Generate PRO Prompt</button>
    <button onclick="copyAll()" class="btn bg-green-600">📋 Copy All</button>
    <button onclick="clearAll()" class="btn bg-gray-700">🧹 Clear</button>
  </div>
</section>

<section id="results" class="space-y-5"></section>

  </div><script>
const R = (arr)=>arr[Math.floor(Math.random()*arr.length)];

function randomizeAll(){
  const chars = [
    'pria muda asia','wanita muda indonesia','pekerja pabrik santai','influencer casual','teknisi muda'
  ];
  const outfits = [
    'kaos putih longgar, celana pendek kargo hitam, sandal jepit','hoodie hitam oversized, jeans, sneakers','kemeja kerja biru, celana chino, sepatu safety','kaos grafis, celana pendek, sepatu slip-on'
  ];
  const inputs = ['telur ayam','daun kelapa','jagung berkulit','botol plastik bekas','kertas koran'];
  const outputs = ['anak ayam warna-warni','bakul anyaman hijau','popcorn berlabel brand','produk daur ulang premium','mainan unik lucu'];
  const locs = ['pabrik futuristik minimalis','gudang industri bersih','lab eksperimental modern','workshop kreatif industrial'];

  document.getElementById('character').value = R(chars);
  document.getElementById('outfit').value = R(outfits);
  document.getElementById('inputObj').value = R(inputs);
  document.getElementById('outputObj').value = R(outputs);
  document.getElementById('location').value = R(locs);
}

function block(title, text){
  return `\n<div class="card p-4">\n  <div class="flex items-center justify-between mb-2">\n    <h3 class="font-semibold">${title}</h3>\n    <button class="btn bg-indigo-600" onclick="copyText(this)">Copy</button>\n  </div>\n  <textarea class="w-full h-44 p-3 text-black rounded">${text}</textarea>\n</div>`;}

function sceneCard(idx, name, img, vid){ return \n<div class="space-y-3">\n  <h2 class="text-xl font-bold">🎬 Scene ${idx} — ${name}</h2>\n  ${block('PROMPT IMAGE', img)}\n  ${block('PROMPT VIDEO (animate the image result)', vid)}\n</div>; }

function generatePrompt(){ const character = document.getElementById('character').value.trim(); const outfit = document.getElementById('outfit').value.trim(); const inputObj = document.getElementById('inputObj').value.trim(); const outputObj = document.getElementById('outputObj').value.trim(); const location = document.getElementById('location').value.trim(); const style = document.getElementById('style').value; const camera = document.getElementById('camera').value; const lighting = document.getElementById('lighting').value;

const base = ${style}, ${camera}, ${lighting}, ultra realistic, high detail, 8k, cinematic composition, shallow depth of field;

const s1_img = ${character}, wearing ${outfit}, standing beside a mysterious large machine in ${location}, curious expression, ${base}; const s1_vid = animate the exact scene: ${s1_img}, slow push-in camera, subtle idle motion (breathing, micro head movement), light flicker from machine, slight handheld, 24fps film look;

const s2_img = close-up hands of ${character} inserting ${inputObj} into the top of a large machine, macro detail on textures, industrial design visible, ${base}; const s2_vid = animate the exact scene: ${s2_img}, hands move naturally inserting ${inputObj}, slight slow motion, focus pull from hand to machine opening, micro particles, realistic physics;

const s3_img = inside the machine, complex mechanisms transforming ${inputObj} into ${outputObj}, gears, belts, glowing elements, dynamic industrial interior, ${base}; const s3_vid = animate the exact scene: ${s3_img}, moving gears and belts, transformation sequence visibly progressing, dynamic tracking camera through mechanisms, motion blur, sparks or light streaks;

const s4_img = ${outputObj} coming out of the machine, clean and aesthetically pleasing, product reveal, satisfying composition, ${base}; const s4_vid = animate the exact scene: ${s4_img}, product exits smoothly, slight slow motion for emphasis, particles and soft glow, camera locks focus on output, satisfying timing;

const s5_img = ${character} looking amazed at the machine, framing similar to opening shot for loop, balanced composition, ${base}; const s5_vid = animate the exact scene: ${s5_img}, subtle reaction (eyes widen, slight smile), camera slowly pulls back to match opening framing, seamless loop transition;

const html = [ sceneCard(1, 'HOOK', s1_img, s1_vid), sceneCard(2, 'INPUT', s2_img, s2_vid), sceneCard(3, 'PROCESS', s3_img, s3_vid), sceneCard(4, 'OUTPUT', s4_img, s4_vid), sceneCard(5, 'LOOP', s5_img, s5_vid) ].join('');

document.getElementById('results').innerHTML = html; }

function copyText(btn){ const ta = btn.parentElement.parentElement.querySelector('textarea'); ta.select(); document.execCommand('copy'); btn.innerText = 'Copied!'; setTimeout(()=>btn.innerText='Copy',1200); }

function copyAll(){ const texts = Array.from(document.querySelectorAll('#results textarea')).map(t=>t.value).join('\n\n'); const tmp = document.createElement('textarea'); tmp.value = texts; document.body.appendChild(tmp); tmp.select(); document.execCommand('copy'); document.body.removeChild(tmp); alert('All prompts copied'); }

function clearAll(){ document.getElementById('results').innerHTML = ''; } </script>

</body>
</html>
